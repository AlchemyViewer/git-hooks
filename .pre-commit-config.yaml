repos:
- repo: https://github.com/PyCQA/flake8
  rev: 7.3.0
  hooks:
  - id: flake8
- repo: https://github.com/hhatto/autopep8
  rev: v2.3.2
  hooks:
  - id: autopep8
- repo: local
  hooks:
  - id: tox 
    name: tox 
    language: system
    pass_filenames: false
    entry: tox
    types: [python]
